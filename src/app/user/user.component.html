<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="col-md-5">

    <div class="card shadow-lg p-4">
      <h3 class="text-center mb-4 text-primary">User Registration</h3>

      <form [formGroup]="signUpForm" (ngSubmit)="registerUser()">

        <!-- Name -->
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input 
            type="text" 
            class="form-control" 
            formControlName="name"
            placeholder="Enter your name">

          <!-- <small class="text-danger"
            *ngIf="signUpForm.get('name')?.touched && signUpForm.get('name')?.invalid">
            Name is required
          </small> -->
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input 
            type="email" 
            class="form-control" 
            formControlName="email"
            placeholder="Enter your email">

          <!-- <small class="text-danger"
            *ngIf="signUpForm.get('email')?.touched && signUpForm.get('email')?.invalid">
            Enter a valid email
          </small> -->
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input 
            type="password" 
            class="form-control" 
            formControlName="password"
            placeholder="Enter password">

          <!-- <small class="text-danger"
            *ngIf="signUpForm.get('password')?.touched && signUpForm.get('password')?.invalid">
            Password is required
          </small> -->
        </div>

        <!-- Button -->
        <button 
          type="submit" 
          class="btn btn-primary w-100"
          [disabled]="signUpForm.invalid">
          Register
        </button>

         <div class="text-center mt-3">
          <span>Already have an account?</span>
          <a routerLink="/login" class="ms-2 text-decoration-none fw-bold">
            Login
          </a>
        </div>

      </form>
    </div>

  </div>
</div>
