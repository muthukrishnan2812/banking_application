<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 w-100">

            <div class="card shadow-lg border-0 rounded-4 w-100">
                <div class="card-body p-4 w-100">

                    <h3 class="text-center mb-4 text-primary">
                        Add Account
                    </h3>

                    <form [formGroup]="accountForm" (ngSubmit)="createAccount()" class="">

                        <div class="mb-3">
                            <label for="accountNumber" class="form-label fw-semibold">
                                Account Number
                            </label>
                            <input 
                                type="text"
                                id="accountNumber"
                                class="form-control"
                                formControlName="accountNo"
                                placeholder="Enter your account number">
                        </div>

                        <div class="mb-4">
                            <label for="balance" class="form-label fw-semibold">
                                Balance
                            </label>
                            <input 
                                type="number"
                                id="balance"
                                class="form-control"
                                formControlName="balance"
                                placeholder="Enter your balance">
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success rounded-pill">
                                Create Account
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>
